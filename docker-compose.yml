services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_demo
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_demo"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: postgres://agent:agentpass@db:5432/agent_demo
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  postgres_data:
